<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Control de Asistencia — I.E. La Candelaria</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root {
      --bg: #0b111b;
      --card: #111d2e;
      --border: #1e3050;
      --blue: #0095ff;
      --blue-glow: rgba(0,149,255,0.25);
      --yellow: #ffc300;
      --green: #00e676;
      --red: #ff1744;
      --text: #e8f0fe;
      --muted: #6b7f99;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── HEADER ── */
    header {
      width: 100%;
      background: linear-gradient(135deg, #0d1b2e 0%, #0b111b 100%);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 12px;
      text-align: center;
    }
    header h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    header p { font-size: 12px; color: var(--yellow); margin-top: 2px; }
    .badge {
      display: inline-block;
      background: rgba(0,149,255,0.12);
      border: 1px solid rgba(0,149,255,0.3);
      color: var(--blue);
      font-size: 11px;
      padding: 3px 12px;
      border-radius: 20px;
      margin-top: 8px;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      padding: 13px 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      user-select: none;
    }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

    /* ── PANELS ── */
    .panel { display: none; width: 100%; max-width: 560px; padding: 16px; }
    .panel.active { display: block; }

    /* ── SCANNER ── */
    #reader {
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
      min-height: 50px;
    }
    #reader video { width: 100% !important; border-radius: 14px; }
    /* Ocultar controles internos de la librería */
    #reader__scan_region img { display: none !important; }
    #reader__dashboard { display: none !important; }

    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.15s;
      letter-spacing: 0.5px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--blue); color: white; box-shadow: 0 4px 20px var(--blue-glow); }
    .btn-danger { background: #c62828; color: white; }
    .btn-secondary { background: var(--border); color: var(--text); }

    /* ── STATUS ── */
    .status {
      border-radius: 12px;
      padding: 14px 16px;
      margin-top: 12px;
      font-size: 14px;
      text-align: center;
      line-height: 1.5;
      display: none;
    }
    .status.show { display: block; }
    .status.loading { background: rgba(0,149,255,0.1); border: 1px solid rgba(0,149,255,0.3); color: #66bbff; }
    .status.success { background: rgba(0,230,118,0.1); border: 1px solid rgba(0,230,118,0.3); color: var(--green); }
    .status.error   { background: rgba(255,23,68,0.1);  border: 1px solid rgba(255,23,68,0.3);  color: #ff6b6b; }
    .status.warn    { background: rgba(255,195,0,0.1);  border: 1px solid rgba(255,195,0,0.3);  color: var(--yellow); }

    /* ── LAST SCAN ── */
    .last-scan {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-top: 12px;
      display: none;
    }
    .last-scan.show { display: block; }
    .last-scan .ls-name { font-size: 17px; font-weight: 700; color: var(--green); }
    .last-scan .ls-detail { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* ── CONFIG BOX ── */
    .config-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .config-box label { display: block; color: var(--muted); font-size: 11px; margin-bottom: 4px; margin-top: 10px; }
    .config-box label:first-child { margin-top: 0; }
    .config-box input, .config-box select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
    }
    .api-status { font-size: 11px; margin-top: 6px; }
    .api-ok { color: var(--green); }
    .api-err { color: var(--red); }

    /* ── REGISTROS ── */
    .reg-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .reg-count {
      background: var(--blue);
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .reg-filter {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .reg-filter input, .reg-filter select {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
    }
    .reg-list { display: flex; flex-direction: column; gap: 6px; }
    .reg-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .reg-item .ri-name { font-size: 13px; font-weight: 600; }
    .reg-item .ri-detail { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .ri-time { font-size: 13px; font-weight: 700; color: var(--blue); white-space: nowrap; margin-left: 10px; }
    .ri-dup { border-left: 3px solid var(--yellow); }

    /* ── QR CARDS ── */
    .qr-controls { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .qr-controls select {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
    }
    .qr-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .qr-card {
      background: white;
      color: #111;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
      page-break-inside: avoid;
    }
    .qr-card img { width: 100px; height: 100px; }
    .qr-card .qc-name { font-size: 10px; font-weight: 700; margin-top: 6px; line-height: 1.3; }
    .qr-card .qc-id { font-size: 9px; color: #555; }
    .qr-card .qc-grupo { font-size: 9px; color: #0095ff; font-weight: 600; }

    @media print {
      header, .tabs, .panel:not(#panel-qr) { display: none !important; }
      #panel-qr { display: block !important; padding: 0; }
      .qr-controls, .btn { display: none !important; }
      .qr-grid { grid-template-columns: repeat(3, 1fr); }
      body { background: white; }
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 40px 20px;
      font-size: 14px;
    }
    .empty-state div { font-size: 36px; margin-bottom: 10px; }
  </style>
</head>
<body>

<header>
  <h1>📋 Control de Asistencia</h1>
  <p>I.E. La Candelaria • Esperanza y Valor</p>
  <span class="badge">📚 Tecnología e Informática</span>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('scan',this)">📷 Escanear</div>
  <div class="tab" onclick="showTab('registros',this)">📋 Registros</div>
  <div class="tab" onclick="showTab('qr',this)">🔳 Tarjetas QR</div>
  <div class="tab" onclick="showTab('config',this)">⚙️</div>
</div>

<!-- ══ PANEL ESCANEAR ══ -->
<div class="panel active" id="panel-scan">
  <div id="reader"></div>
  <div class="status" id="scan-status"></div>
  <div class="last-scan" id="last-scan">
    <div class="ls-name" id="ls-nombre"></div>
    <div class="ls-detail" id="ls-detail"></div>
  </div>
  <button class="btn btn-primary" id="btn-activar" onclick="iniciarEscaner()">📷 Activar Cámara</button>
  <button class="btn btn-danger" id="btn-detener" style="display:none" onclick="detenerEscaner()">⏹ Detener Cámara</button>
</div>

<!-- ══ PANEL REGISTROS ══ -->
<div class="panel" id="panel-registros">
  <div class="reg-header">
    <span style="font-weight:700;">Registros de hoy</span>
    <span class="reg-count" id="reg-count">0</span>
  </div>
  <div class="reg-filter">
    <select id="filtro-grupo" onchange="renderRegistros()">
      <option value="">Todos los grupos</option>
    </select>
    <button class="btn btn-secondary" style="width:auto;padding:8px 14px;margin-top:0;font-size:12px;" onclick="cargarRegistros()">🔄</button>
  </div>
  <div class="reg-list" id="reg-list">
    <div class="empty-state"><div>📋</div>Presiona 🔄 para cargar</div>
  </div>
</div>

<!-- ══ PANEL QR ══ -->
<div class="panel" id="panel-qr">
  <div class="qr-controls">
    <select id="qr-grupo" onchange="cargarQR()">
      <option value="">Selecciona un grupo...</option>
    </select>
    <button class="btn btn-primary" style="margin-top:0" onclick="window.print()">🖨 Imprimir tarjetas</button>
  </div>
  <div class="qr-grid" id="qr-grid">
    <div class="empty-state" style="grid-column:1/-1"><div>🔳</div>Selecciona un grupo</div>
  </div>
</div>

<!-- ══ PANEL CONFIG ══ -->
<div class="panel" id="panel-config">
  <div class="config-box">
    <label>URL del Apps Script (Web App)</label>
    <input type="url" id="cfg-url" placeholder="https://script.google.com/macros/s/.../exec"
           oninput="guardarConfig()">
    <div class="api-status" id="api-status"></div>

    <label>Materia</label>
    <input type="text" id="cfg-materia" value="Tecnología e Informática" oninput="guardarConfig()">

    <label>Bloquear duplicados (minutos)</label>
    <select id="cfg-dup" onchange="guardarConfig()">
      <option value="0">No bloquear</option>
      <option value="5">5 minutos</option>
      <option value="10" selected>10 minutos</option>
      <option value="30">30 minutos</option>
      <option value="60">1 hora</option>
      <option value="480">Todo el día</option>
    </select>
  </div>
  <button class="btn btn-primary" onclick="probarConexion()">🔌 Probar conexión</button>
  <p style="font-size:11px;color:var(--muted);margin-top:16px;text-align:center;line-height:1.6;">
    Versión 2.0 • I.E. La Candelaria<br>
    Desarrollado con Google Apps Script + GitHub Pages
  </p>
</div>

<script>
// ══════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════
let cfg = {
  url: localStorage.getItem('cfg_url') || '',
  materia: localStorage.getItem('cfg_materia') || 'Tecnología e Informática',
  dupMin: parseInt(localStorage.getItem('cfg_dup') || '10')
};

function guardarConfig() {
  cfg.url     = document.getElementById('cfg-url').value.trim();
  cfg.materia = document.getElementById('cfg-materia').value.trim();
  cfg.dupMin  = parseInt(document.getElementById('cfg-dup').value);
  localStorage.setItem('cfg_url', cfg.url);
  localStorage.setItem('cfg_materia', cfg.materia);
  localStorage.setItem('cfg_dup', cfg.dupMin);
}

function cargarConfigUI() {
  document.getElementById('cfg-url').value     = cfg.url;
  document.getElementById('cfg-materia').value = cfg.materia;
  document.getElementById('cfg-dup').value     = cfg.dupMin;
}

// ══════════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════════
function showTab(nombre, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + nombre).classList.add('active');
  el.classList.add('active');
  if (nombre === 'config') cargarConfigUI();
  if (nombre === 'registros') cargarRegistros();
  if (nombre === 'qr') cargarGruposQR();
}

// ══════════════════════════════════════════════
//  API HELPER
// ══════════════════════════════════════════════
async function api(params) {
  if (!cfg.url) throw new Error('Configura la URL del Apps Script en ⚙️');
  const url = cfg.url + '?' + new URLSearchParams(params);
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function probarConexion() {
  const el = document.getElementById('api-status');
  el.className = 'api-status';
  el.textContent = '⏳ Probando...';
  try {
    const data = await api({ action: 'ping' });
    el.className = 'api-status api-ok';
    el.textContent = '✅ Conexión OK — ' + (data.estudiantes || '?') + ' estudiantes';
  } catch(e) {
    el.className = 'api-status api-err';
    el.textContent = '❌ ' + e.message;
  }
}

// ══════════════════════════════════════════════
//  ANTI-DUPLICADOS (cache local)
// ══════════════════════════════════════════════
const scanCache = {};
function esDuplicado(id) {
  if (cfg.dupMin === 0) return false;
  const last = scanCache[id];
  if (!last) return false;
  return (Date.now() - last) < cfg.dupMin * 60 * 1000;
}
function marcarEscaneado(id) { scanCache[id] = Date.now(); }

// ══════════════════════════════════════════════
//  SCANNER
// ══════════════════════════════════════════════
let scanner = null;
let escaneando = false;
let procesando = false;

function setStatus(msg, tipo) {
  const el = document.getElementById('scan-status');
  el.className = 'status show ' + tipo;
  el.innerHTML = msg;
}
function clearStatus() {
  document.getElementById('scan-status').className = 'status';
}

async function iniciarEscaner() {
  if (escaneando) return;
  if (!cfg.url) {
    setStatus('⚙️ Primero configura la URL del Apps Script en la pestaña ⚙️', 'warn');
    return;
  }
  clearStatus();

  try {
    // Pedir permiso de cámara explícitamente (funciona porque NO estamos en iframe)
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } }
    });
    stream.getTracks().forEach(t => t.stop());
  } catch(err) {
    let msg = '❌ Sin acceso a la cámara.<br>';
    if (err.name === 'NotAllowedError') msg += '👉 Permite el acceso a la cámara en la barra del navegador.';
    else if (err.name === 'NotFoundError') msg += '👉 No se detectó cámara en este dispositivo.';
    else msg += err.message;
    setStatus(msg, 'error');
    return;
  }

  try {
    if (scanner) { try { await scanner.stop(); } catch(e){} }
    scanner = new Html5Qrcode('reader', { verbose: false });
    await scanner.start(
      { facingMode: { ideal: 'environment' } },
      { fps: 15, qrbox: { width: 260, height: 260 }, aspectRatio: 1.0 },
      onQRDetectado,
      () => {}
    );
    escaneando = true;
    document.getElementById('btn-activar').style.display = 'none';
    document.getElementById('btn-detener').style.display = 'flex';
    setStatus('✅ Cámara activa — apunta al código QR del estudiante', 'success');
  } catch(err) {
    setStatus('❌ Error al iniciar escáner: ' + err.message, 'error');
  }
}

async function detenerEscaner() {
  if (scanner && escaneando) { try { await scanner.stop(); } catch(e){} }
  escaneando = false;
  procesando = false;
  document.getElementById('btn-activar').style.display = 'flex';
  document.getElementById('btn-detener').style.display = 'none';
  clearStatus();
}

async function onQRDetectado(texto) {
  if (procesando) return;

  // Anti-duplicado local
  if (esDuplicado(texto)) {
    setStatus('⚠️ Este estudiante ya fue registrado recientemente.', 'warn');
    return;
  }

  procesando = true;
  await detenerEscaner();
  setStatus('⏳ Registrando asistencia...', 'loading');

  try {
    const data = await api({
      action: 'registrar',
      id: texto,
      materia: cfg.materia
    });

    if (data.success) {
      marcarEscaneado(texto);
      document.getElementById('last-scan').classList.add('show');
      document.getElementById('ls-nombre').textContent = '✅ ' + data.nombre;
      document.getElementById('ls-detail').textContent =
        data.grupo + ' • ' + new Date().toLocaleTimeString('es-CO');
      setStatus('¡Asistencia registrada correctamente!', 'success');
    } else if (data.duplicado) {
      setStatus('⚠️ ' + data.nombre + ' ya tiene asistencia registrada hoy.', 'warn');
    } else {
      setStatus('❌ Estudiante no encontrado: ' + texto, 'error');
    }
  } catch(err) {
    setStatus('❌ Error al guardar: ' + err.message, 'error');
  }

  procesando = false;
  setTimeout(() => iniciarEscaner(), 2500);
}

// ══════════════════════════════════════════════
//  REGISTROS
// ══════════════════════════════════════════════
let todosRegistros = [];

async function cargarRegistros() {
  document.getElementById('reg-list').innerHTML =
    '<div class="empty-state"><div>⏳</div>Cargando...</div>';
  try {
    const data = await api({ action: 'registrosHoy' });
    todosRegistros = data.registros || [];

    // Poblar filtro de grupos
    const grupos = [...new Set(todosRegistros.map(r => r.grupo))].sort();
    const sel = document.getElementById('filtro-grupo');
    const valActual = sel.value;
    sel.innerHTML = '<option value="">Todos los grupos</option>';
    grupos.forEach(g => {
      const o = document.createElement('option');
      o.value = g; o.textContent = g;
      if (g === valActual) o.selected = true;
      sel.appendChild(o);
    });

    renderRegistros();
  } catch(err) {
    document.getElementById('reg-list').innerHTML =
      '<div class="empty-state"><div>❌</div>' + err.message + '</div>';
  }
}

function renderRegistros() {
  const grupo = document.getElementById('filtro-grupo').value;
  let lista = grupo ? todosRegistros.filter(r => r.grupo === grupo) : todosRegistros;

  // Detectar duplicados (mismo ID, mismo día)
  const conteo = {};
  lista.forEach(r => { conteo[r.id] = (conteo[r.id] || 0) + 1; });

  document.getElementById('reg-count').textContent = lista.length;

  if (lista.length === 0) {
    document.getElementById('reg-list').innerHTML =
      '<div class="empty-state"><div>📋</div>Sin registros hoy</div>';
    return;
  }

  document.getElementById('reg-list').innerHTML = lista.map(r => `
    <div class="reg-item ${conteo[r.id] > 1 ? 'ri-dup' : ''}">
      <div>
        <div class="ri-name">${r.nombre}</div>
        <div class="ri-detail">${r.grupo} • ID: ${r.id} ${conteo[r.id] > 1 ? '⚠️ dup' : ''}</div>
      </div>
      <div class="ri-time">${r.hora}</div>
    </div>
  `).join('');
}

// ══════════════════════════════════════════════
//  QR TARJETAS
// ══════════════════════════════════════════════
async function cargarGruposQR() {
  try {
    const data = await api({ action: 'grupos' });
    const sel = document.getElementById('qr-grupo');
    sel.innerHTML = '<option value="">Selecciona un grupo...</option>';
    (data.grupos || []).forEach(g => {
      const o = document.createElement('option');
      o.value = g; o.textContent = g;
      sel.appendChild(o);
    });
  } catch(err) { /* silencioso */ }
}

async function cargarQR() {
  const grupo = document.getElementById('qr-grupo').value;
  const grid = document.getElementById('qr-grid');
  if (!grupo) { grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div>🔳</div>Selecciona un grupo</div>'; return; }

  grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div>⏳</div>Cargando...</div>';
  try {
    const data = await api({ action: 'estudiantes', grupo });
    grid.innerHTML = (data.estudiantes || []).map(e => `
      <div class="qr-card">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${e.id}" alt="QR">
        <div class="qc-nombre">${e.nombre}</div>
        <div class="qc-id">ID: ${e.id}</div>
        <div class="qc-grupo">${e.grupo}</div>
      </div>
    `).join('');
  } catch(err) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div>❌</div>' + err.message + '</div>';
  }
}
</script>
</body>
</html>
